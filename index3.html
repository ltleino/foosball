<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fussehommia</title>
  <style>
    :root {
      --bg: #f2f2f2;
      --panel: rgba(255, 255, 255, 0.96);
      --border: #4b5563;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
      --gap: 18px;
      --emoji-size: clamp(56px, 10vw, 90px);
      --text-md: clamp(18px, 4vw, 28px);
      --button-pad-y: 16px;
      --button-pad-x: 28px;
      --blue: #2563eb;
      --red: #dc2626;
      --gray: #6b7280;
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111;
      overscroll-behavior: none;
    }

    body {
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .layer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
      z-index: 10;
      touch-action: manipulation;
    }

    #registrationLayer {
      background: var(--panel);
    }

    #participationLayer {
      display: none;
      background: transparent;
      cursor: pointer;
    }

    #fxLayer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 20;
    }

    .panel {
      width: min(92vw, 620px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px 18px 28px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 14px 0;
      align-items: center;
    }

    .fieldLabel {
      font-size: var(--text-md);
      font-weight: 700;
    }

    input[type="number"] {
      width: min(50vw, 180px);
      font-size: clamp(28px, 8vw, 52px);
      text-align: center;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
    }

    input[type="number"]:disabled {
      background: #ececec;
      color: #555;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      margin-top: 20px;
    }

    button {
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: var(--button-pad-y) var(--button-pad-x);
      background: #fff;
      cursor: pointer;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }

    #splitToggle {
      font-size: var(--text-md);
      min-width: min(88vw, 420px);
    }

    #startButton {
      font-size: clamp(34px, 8vw, 54px);
      min-width: 120px;
    }

    #participationText {
      font-size: clamp(28px, 8vw, 64px);
      font-weight: 800;
      line-height: 1.1;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px 22px;
      max-width: min(90vw, 720px);
      pointer-events: none;
    }

    #resultsLayer {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 24px 16px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(44vw, 180px), 1fr));
      gap: var(--gap);
      align-content: start;
      justify-items: center;
      touch-action: manipulation;
    }

    .card {
      width: min(100%, 260px);
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--emoji-size);
      color: white;
      box-shadow: var(--shadow);
      will-change: transform, opacity;
      transform: translateZ(0);
    }

    .card.enter {
      animation: cardPop 220ms steps(5, end);
    }

    .card.blue {
      background: var(--blue);
    }

    .card.red {
      background: var(--red);
    }

    .card.gray {
      background: var(--gray);
    }

    .explosion {
      position: fixed;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .explosion-core,
    .explosion-ring,
    .explosion-spark {
      position: absolute;
      left: 0;
      top: 0;
      image-rendering: pixelated;
    }

    .explosion-core {
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      background: #fff8c5;
      box-shadow:
        0 0 0 8px #fde047,
        0 0 0 16px #fb923c,
        0 0 0 24px rgba(239, 68, 68, 0.65);
      animation: boomCore 260ms steps(5, end) forwards;
    }

    .explosion-ring {
      width: 22px;
      height: 22px;
      margin-left: -11px;
      margin-top: -11px;
      border: 6px solid rgba(255, 245, 157, 0.95);
      animation: boomRing 320ms steps(6, end) forwards;
    }

    .explosion-spark {
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      background: var(--spark-color, #fde047);
      animation: boomParticle 420ms steps(6, end) forwards;
      transform: translate(0, 0) scale(1);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    @keyframes cardPop {
      0% {
        transform: scale(0.40) rotate(-6deg);
        opacity: 0.4;
      }
      60% {
        transform: scale(1.10) rotate(2deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes boomCore {
      0% {
        transform: scale(0.35);
        opacity: 1;
      }
      70% {
        transform: scale(1.15);
        opacity: 1;
      }
      100% {
        transform: scale(1.55);
        opacity: 0;
      }
    }

    @keyframes boomRing {
      0% {
        transform: scale(0.3);
        opacity: 0.95;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    @keyframes boomParticle {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.25);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="registrationLayer" class="layer">
    <div class="panel">
      <div class="field">
        <div class="fieldLabel">Paljos pannaan?</div>
        <input id="participantCount" type="number" min="4" step="1" inputmode="numeric" value="4">
      </div>

      <div class="field">
        <div id="privilegedLabel" class="fieldLabel">Privit (0–3)</div>
        <input id="privilegedCount" type="number" min="0" max="3" step="1" inputmode="numeric" value="0">
      </div>

      <div class="row">
        <button id="splitToggle" type="button" aria-pressed="false">
          Splittaa eka pari
        </button>
        <button id="startButton" type="button" aria-label="Aloita">🔥</button>
      </div>
    </div>
  </div>

  <div id="participationLayer" class="layer" aria-live="polite">
    <div id="participationText">Tap tap tap...</div>
  </div>

  <div id="fxLayer" aria-hidden="true"></div>
  <div id="resultsLayer"></div>

  <script>
    (function () {
      'use strict';

      const OUTCOMES = Object.freeze([
        { id: 'blue-shield', icon: '🛡️', color: 'blue' },
        { id: 'blue-sword',  icon: '🗡️', color: 'blue' },
        { id: 'red-shield',  icon: '🛡️', color: 'red'  },
        { id: 'red-sword',   icon: '🗡️', color: 'red'  }
      ]);

      const EXCLUDED_OUTCOME = Object.freeze({
        id: 'excluded',
        icon: '🖕',
        color: 'gray'
      });

      const state = {
        totalParticipants: 0,
        privilegedCount: 0,
        winnerCount: 0,
        splitActive: false,
        clickCount: 0,
        resultsBySlot: [],
        drawOrder: []
      };

      const registrationLayer = document.getElementById('registrationLayer');
      const participationLayer = document.getElementById('participationLayer');
      const participationText = document.getElementById('participationText');
      const resultsLayer = document.getElementById('resultsLayer');
      const fxLayer = document.getElementById('fxLayer');

      const participantInput = document.getElementById('participantCount');
      const privilegedInput = document.getElementById('privilegedCount');
      const privilegedLabel = document.getElementById('privilegedLabel');
      const splitToggle = document.getElementById('splitToggle');
      const startButton = document.getElementById('startButton');

      let audioContext = null;
      let cachedNoiseBuffer = null;

      function shuffle(array) {
        const a = array.slice();
        for (let i = a.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function range(count) {
        return Array.from({ length: count }, (_, i) => i);
      }

      function cloneOutcome(outcome) {
        return {
          id: outcome.id,
          icon: outcome.icon,
          color: outcome.color
        };
      }

      function readStrictInteger(input) {
        if (input.value.trim() === '') return null;
        const value = input.valueAsNumber;
        if (!Number.isFinite(value) || !Number.isInteger(value)) return null;
        return value;
      }

      function resetRoundState() {
        state.totalParticipants = 0;
        state.privilegedCount = 0;
        state.winnerCount = 0;
        state.clickCount = 0;
        state.resultsBySlot = [];
        state.drawOrder = [];

        resultsLayer.textContent = '';
        fxLayer.textContent = '';
        participationText.style.display = '';
        participationLayer.style.display = 'none';
        registrationLayer.style.display = 'flex';
      }

      function updateSplitUI() {
        const splitActive = splitToggle.dataset.active === 'true';

        splitToggle.textContent = 'Splittaa eka pari';

        if (splitActive) {
          splitToggle.style.backgroundColor = 'var(--green)';
          splitToggle.setAttribute('aria-pressed', 'true');

          privilegedInput.value = '2';
          privilegedInput.min = '2';
          privilegedInput.max = '2';
          privilegedInput.disabled = true;
          privilegedLabel.textContent = 'Privit (2)';
        } else {
          splitToggle.style.backgroundColor = '';
          splitToggle.setAttribute('aria-pressed', 'false');

          privilegedInput.disabled = false;
          privilegedInput.min = '0';
          privilegedInput.max = '3';
          privilegedLabel.textContent = 'Privit (0–3)';

          const current = readStrictInteger(privilegedInput);
          if (current === null || current < 0 || current > 3) {
            privilegedInput.value = '0';
          }
        }
      }

      function getValidatedSettings() {
        const totalParticipants = readStrictInteger(participantInput);
        if (totalParticipants === null || totalParticipants < 4) {
          alert('Anna osallistujamääräksi kokonaisluku, vähintään 4.');
          return null;
        }

        const splitActive = splitToggle.dataset.active === 'true';
        let privilegedCount = readStrictInteger(privilegedInput);

        if (splitActive) {
          privilegedCount = 2;
          privilegedInput.value = '2';
        }

        if (privilegedCount === null || privilegedCount < 0) {
          alert('Privien määrän pitää olla kokonaisluku.');
          return null;
        }

        const maxPrivileged = splitActive ? 2 : 3;
        if (privilegedCount > maxPrivileged) {
          alert('Privien määrä on liian suuri.');
          return null;
        }

        const winnerCount = Math.min(OUTCOMES.length, totalParticipants);
        privilegedCount = Math.min(privilegedCount, winnerCount);

        return {
          totalParticipants,
          privilegedCount,
          winnerCount,
          splitActive
        };
      }

      function choosePrivilegedAndWinners(totalParticipants, privilegedCount, winnerCount) {
        const shuffledSlots = shuffle(range(totalParticipants));
        const privilegedSlots = shuffledSlots.slice(0, privilegedCount);

        const remainingSlots = shuffledSlots.slice(privilegedCount);
        const nonPrivilegedWinnerSlots = remainingSlots.slice(0, winnerCount - privilegedCount);

        return {
          privilegedSlots,
          nonPrivilegedWinnerSlots,
          nonPrivilegedAllSlots: remainingSlots
        };
      }

      function assignOutcomes(totalParticipants, privilegedSlots, nonPrivilegedWinnerSlots, splitActive) {
        const resultsBySlot = Array.from(
          { length: totalParticipants },
          () => cloneOutcome(EXCLUDED_OUTCOME)
        );

        let remainingOutcomePool = shuffle(OUTCOMES).map(cloneOutcome);

        if (splitActive && privilegedSlots.length >= 2) {
          const firstPrivilegedSlot = privilegedSlots[0];
          const secondPrivilegedSlot = privilegedSlots[1];

          const firstOutcome = remainingOutcomePool[Math.floor(Math.random() * remainingOutcomePool.length)];
          remainingOutcomePool = remainingOutcomePool.filter(o => o.id !== firstOutcome.id);

          const oppositeColorPool = remainingOutcomePool.filter(o => o.color !== firstOutcome.color);
          const secondOutcome = oppositeColorPool[Math.floor(Math.random() * oppositeColorPool.length)];
          remainingOutcomePool = remainingOutcomePool.filter(o => o.id !== secondOutcome.id);

          resultsBySlot[firstPrivilegedSlot] = firstOutcome;
          resultsBySlot[secondPrivilegedSlot] = secondOutcome;
        }

        const alreadyAssignedPrivileged = splitActive ? 2 : 0;
        const remainingPrivilegedSlots = privilegedSlots.slice(alreadyAssignedPrivileged);
        const remainingWinnerSlots = remainingPrivilegedSlots.concat(nonPrivilegedWinnerSlots);

        const shuffledRemainingWinnerSlots = shuffle(remainingWinnerSlots);

        for (let i = 0; i < shuffledRemainingWinnerSlots.length; i += 1) {
          const slot = shuffledRemainingWinnerSlots[i];
          const outcome = remainingOutcomePool[i];
          if (outcome) {
            resultsBySlot[slot] = outcome;
          }
        }

        return resultsBySlot;
      }

      function buildDrawOrder(privilegedSlots, nonPrivilegedAllSlots) {
        return shuffle(privilegedSlots).concat(shuffle(nonPrivilegedAllSlots));
      }

      function renderCard(outcome) {
        const card = document.createElement('div');
        card.className = 'card ' + outcome.color + ' enter';
        card.textContent = outcome.icon;
        resultsLayer.appendChild(card);

        window.setTimeout(function () {
          card.classList.remove('enter');
        }, 240);
      }

      function ensureAudioContext() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;

        if (!audioContext) {
          audioContext = new AudioCtor();
        }

        if (audioContext.state === 'suspended') {
          audioContext.resume().catch(function () {});
        }

        return audioContext;
      }

      function getNoiseBuffer(ctx) {
        if (cachedNoiseBuffer && cachedNoiseBuffer.sampleRate === ctx.sampleRate) {
          return cachedNoiseBuffer;
        }

        const duration = 0.12;
        const length = Math.floor(ctx.sampleRate * duration);
        const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
        const data = buffer.getChannelData(0);

        let heldValue = 0;
        let holdFrames = 0;

        for (let i = 0; i < length; i += 1) {
          if (holdFrames <= 0) {
            heldValue = Math.random() * 2 - 1;
            holdFrames = 18 + Math.floor(Math.random() * 30);
          }
          data[i] = heldValue;
          holdFrames -= 1;
        }

        cachedNoiseBuffer = buffer;
        return buffer;
      }

      function playExplosionSound() {
        const ctx = ensureAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;

        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.28, now + 0.005);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        master.connect(ctx.destination);

        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(52, now + 0.18);
        osc.detune.setValueAtTime((Math.random() * 50) - 25, now);

        const oscGain = ctx.createGain();
        oscGain.gain.setValueAtTime(0.28, now);
        oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        osc.connect(oscGain);
        oscGain.connect(master);

        const noise = ctx.createBufferSource();
        noise.buffer = getNoiseBuffer(ctx);

        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass';
        noiseFilter.frequency.setValueAtTime(1200, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(240, now + 0.12);
        noiseFilter.Q.value = 0.9;

        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.18, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(master);

        osc.start(now);
        osc.stop(now + 0.19);

        noise.start(now);
        noise.stop(now + 0.12);

        window.setTimeout(function () {
          try {
            master.disconnect();
          } catch (err) {}
        }, 260);
      }

      function getExplosionPalette(outcomeColor) {
        if (outcomeColor === 'blue') {
          return ['#ffffff', '#fde047', '#fb923c', '#60a5fa'];
        }
        if (outcomeColor === 'red') {
          return ['#ffffff', '#fde047', '#fb923c', '#f87171'];
        }
        return ['#ffffff', '#fde047', '#d1d5db', '#9ca3af'];
      }

      function createExplosion(x, y, outcomeColor) {
        const palette = getExplosionPalette(outcomeColor);
        const explosion = document.createElement('div');
        explosion.className = 'explosion';
        explosion.style.left = x + 'px';
        explosion.style.top = y + 'px';

        const fragment = document.createDocumentFragment();

        const core = document.createElement('div');
        core.className = 'explosion-core';
        fragment.appendChild(core);

        const ring = document.createElement('div');
        ring.className = 'explosion-ring';
        fragment.appendChild(ring);

        const particleCount = 14;
        for (let i = 0; i < particleCount; i += 1) {
          const particle = document.createElement('div');
          const angle = (Math.PI * 2 * i) / particleCount + (Math.random() * 0.35);
          const distance = 34 + Math.random() * 52;
          const dx = Math.cos(angle) * distance;
          const dy = Math.sin(angle) * distance;

          particle.className = 'explosion-spark';
          particle.style.setProperty('--dx', dx.toFixed(1) + 'px');
          particle.style.setProperty('--dy', dy.toFixed(1) + 'px');
          particle.style.setProperty('--spark-color', palette[Math.floor(Math.random() * palette.length)]);

          fragment.appendChild(particle);
        }

        explosion.appendChild(fragment);
        fxLayer.appendChild(explosion);

        window.setTimeout(function () {
          explosion.remove();
        }, 460);
      }

      function startGame() {
        const settings = getValidatedSettings();
        if (!settings) return;

        resetRoundState();

        state.totalParticipants = settings.totalParticipants;
        state.privilegedCount = settings.privilegedCount;
        state.winnerCount = settings.winnerCount;
        state.splitActive = settings.splitActive;

        const result = choosePrivilegedAndWinners(
          state.totalParticipants,
          state.privilegedCount,
          state.winnerCount
        );

        state.resultsBySlot = assignOutcomes(
          state.totalParticipants,
          result.privilegedSlots,
          result.nonPrivilegedWinnerSlots,
          state.splitActive
        );

        state.drawOrder = buildDrawOrder(
          result.privilegedSlots,
          result.nonPrivilegedAllSlots
        );

        ensureAudioContext();

        registrationLayer.style.display = 'none';
        participationLayer.style.display = 'flex';
      }

      function claimNextSlot(event) {
        event.preventDefault();

        if (state.clickCount >= state.drawOrder.length) {
          participationLayer.style.display = 'none';
          return;
        }

        if (state.clickCount === 0) {
          participationText.style.display = 'none';
        }

        const slotIndex = state.drawOrder[state.clickCount];
        const outcome = state.resultsBySlot[slotIndex];

        const tapX = typeof event.clientX === 'number' ? event.clientX : window.innerWidth / 2;
        const tapY = typeof event.clientY === 'number' ? event.clientY : window.innerHeight / 2;

        state.clickCount += 1;

        createExplosion(tapX, tapY, outcome.color);
        playExplosionSound();
        renderCard(outcome);

        if (state.clickCount >= state.drawOrder.length) {
          participationLayer.style.display = 'none';
        }
      }

      splitToggle.addEventListener('pointerdown', function (event) {
        event.preventDefault();
        const current = splitToggle.dataset.active === 'true';
        splitToggle.dataset.active = String(!current);
        updateSplitUI();
      }, { passive: false });

      startButton.addEventListener('pointerdown', function (event) {
        event.preventDefault();
        startGame();
      }, { passive: false });

      participationLayer.addEventListener('pointerdown', claimNextSlot, { passive: false });

      updateSplitUI();
      resetRoundState();
    })();
  </script>
</body>
</html>
